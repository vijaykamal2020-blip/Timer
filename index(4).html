<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ray's Meal Time</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      text-align: center;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #ffecb3, #ffcc80, #a5d6a7, #81d4fa, #ce93d8);
      padding: 18px;
      overflow: hidden;
    }

    body::before {
      content: "🍎 🥦 🥕 🍓 🥛 🍚";
      position: fixed;
      top: 18px;
      left: 0;
      width: 100%;
      font-size: 30px;
      opacity: 0.55;
      animation: floatFood 5s ease-in-out infinite;
    }

    body::after {
      content: "⭐ 🌈 ⭐ 🌈 ⭐";
      position: fixed;
      bottom: 18px;
      left: 0;
      width: 100%;
      font-size: 30px;
      opacity: 0.45;
      animation: floatFood 6s ease-in-out infinite reverse;
    }

    @keyframes floatFood {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .card {
      width: 100%;
      max-width: 430px;
      background: rgba(255, 255, 255, 0.94);
      border-radius: 34px;
      padding: 30px 20px;
      box-shadow: 0 18px 45px rgba(0,0,0,0.22);
      border: 5px solid rgba(255,255,255,0.8);
      position: relative;
      z-index: 1;
    }

    h1 {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 9px;
      font-size: 29px;
      color: #5d4037;
      margin: 0 0 18px;
      text-shadow: 2px 2px #fff3e0;
      white-space: nowrap;
    }

    #timer {
      font-size: 76px;
      margin: 18px 0;
      font-weight: 900;
      color: #1a237e;
      background: linear-gradient(180deg, #fff8e1, #ffffff);
      border-radius: 30px;
      padding: 22px 10px;
      box-shadow: inset 0 0 18px rgba(255,193,7,0.35);
    }

    .progress-wrap {
      width: 100%;
      height: 22px;
      background: #e0e0e0;
      border-radius: 20px;
      overflow: hidden;
      margin: 16px 0 20px;
      box-shadow: inset 0 2px 5px rgba(0,0,0,0.15);
    }

    #progressBar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #66bb6a, #ffee58, #ff7043);
      border-radius: 20px;
      transition: width 0.5s ease;
    }

    .buttons {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    button {
      font-size: 25px;
      padding: 16px 32px;
      border-radius: 20px;
      border: none;
      color: white;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 10px 18px rgba(0,0,0,0.22);
      min-width: 135px;
    }

    #startBtn {
      background: linear-gradient(180deg, #66bb6a, #2e7d32);
    }

    #stopBtn {
      background: linear-gradient(180deg, #ff7043, #d32f2f);
    }

    button:active {
      transform: scale(0.96);
    }

    #status {
      font-size: 23px;
      margin-top: 24px;
      color: #263238;
      background: #e3f2fd;
      border-radius: 22px;
      padding: 16px;
      font-weight: bold;
      min-height: 62px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .message {
      margin-top: 18px;
      font-size: 20px;
      color: #6d4c41;
      background: #fff3e0;
      border-radius: 20px;
      padding: 14px;
      font-weight: bold;
    }

    .confetti {
      position: fixed;
      top: -20px;
      font-size: 28px;
      animation: fall 3s linear forwards;
      z-index: 999;
      pointer-events: none;
    }

    @keyframes fall {
      0% {
        transform: translateY(-20px) rotate(0deg);
        opacity: 1;
      }
      100% {
        transform: translateY(110vh) rotate(360deg);
        opacity: 0;
      }
    }

    @media (max-width: 390px) {
      h1 {
        font-size: 26px;
        gap: 7px;
      }

      #timer {
        font-size: 68px;
      }

      button {
        font-size: 23px;
        padding: 15px 28px;
        min-width: 125px;
      }

      #status {
        font-size: 21px;
      }

      .message {
        font-size: 18px;
      }
    }
  </style>
</head>

<body>
  <div class="card">
    <h1><span>🍎</span><span>Ray's Meal Time</span><span>🥦</span></h1>

    <div id="timer">20:00</div>

    <div class="progress-wrap">
      <div id="progressBar"></div>
    </div>

    <div class="buttons">
      <button id="startBtn">▶ Start</button>
      <button id="stopBtn">■ Stop</button>
    </div>

    <div id="status">Ready</div>

    <div class="message">⭐ Eat slowly and enjoy every bite! 😊</div>
  </div>

<script>
let countdownId = null;
let totalSeconds = 20 * 60;
let remainingSeconds = totalSeconds;
let lastAnnouncedMinute = 0;

const startBtn = document.getElementById("startBtn");
const stopBtn = document.getElementById("stopBtn");
const timer = document.getElementById("timer");
const status = document.getElementById("status");
const progressBar = document.getElementById("progressBar");

function formatTime(seconds) {
  const mins = Math.floor(seconds / 60);
  const secs = seconds % 60;
  return `${mins}:${secs.toString().padStart(2, "0")}`;
}

function updateDisplay() {
  timer.innerText = formatTime(remainingSeconds);

  const completed = totalSeconds - remainingSeconds;
  const progressPercent = (completed / totalSeconds) * 100;
  progressBar.style.width = `${progressPercent}%`;
}

function speak(text) {
  window.speechSynthesis.cancel();

  setTimeout(() => {
    const msg = new SpeechSynthesisUtterance(text);
    msg.rate = 0.9;
    msg.pitch = 1;
    window.speechSynthesis.speak(msg);
  }, 100);
}

function launchConfetti() {
  const emojis = ["🎉", "⭐", "🌈", "🍎", "🥦", "😊"];

  for (let i = 0; i < 28; i++) {
    const confetti = document.createElement("div");
    confetti.className = "confetti";
    confetti.innerText = emojis[Math.floor(Math.random() * emojis.length)];
    confetti.style.left = Math.random() * 100 + "vw";
    confetti.style.animationDelay = Math.random() * 0.8 + "s";
    document.body.appendChild(confetti);

    setTimeout(() => {
      confetti.remove();
    }, 4000);
  }
}

function startTimer() {
  stopTimer(false);

  remainingSeconds = totalSeconds;
  lastAnnouncedMinute = 0;
  updateDisplay();

  status.innerText = "Timer started";
  speak("Ray, meal timer started for 20 minutes.");

  countdownId = setInterval(() => {
    remainingSeconds--;
    updateDisplay();

    const completedMinutes = Math.floor((totalSeconds - remainingSeconds) / 60);

    if (completedMinutes > lastAnnouncedMinute && completedMinutes < 20) {
      lastAnnouncedMinute = completedMinutes;

      const left = 20 - completedMinutes;
      let message = "";

      switch (completedMinutes) {
        case 5:
          message = "Ray, 5 minutes completed. Great job! 15 minutes left.";
          break;

        case 10:
          message = "Ray, 10 minutes completed. You're halfway there! 10 minutes left.";
          break;

        case 15:
          message = "Ray, 15 minutes completed. Only 5 minutes left.";
          break;

        default:
          message = `${completedMinutes} minute${completedMinutes > 1 ? "s" : ""} completed. ${left} minute${left !== 1 ? "s" : ""} left.`;
      }

      status.innerText = message;
      speak(message);
    }

    if (remainingSeconds <= 0) {
      clearInterval(countdownId);
      countdownId = null;
      remainingSeconds = 0;
      updateDisplay();

      const finalMessage = "Ray, your time is up. Mommy is coming to get you.";
      status.innerText = "🎉 Time's Up!";
      speak(finalMessage);
      launchConfetti();
    }
  }, 1000);
}

function stopTimer(announce = true) {
  if (countdownId !== null) {
    clearInterval(countdownId);
    countdownId = null;
  }

  window.speechSynthesis.cancel();

  remainingSeconds = totalSeconds;
  lastAnnouncedMinute = 0;
  updateDisplay();

  if (announce) {
    status.innerText = "Timer stopped";
    speak("Timer stopped.");
  } else {
    status.innerText = "Ready";
  }
}

startBtn.addEventListener("click", startTimer);
stopBtn.addEventListener("click", () => stopTimer(true));

updateDisplay();
</script>
</body>
</html>
