<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ray's Meal Timer</title>
<style>
*{box-sizing:border-box}
body{margin:0;min-height:100vh;font-family:Arial,sans-serif;display:flex;justify-content:center;align-items:center;background:linear-gradient(135deg,#ffecb3,#ffcc80,#a5d6a7,#81d4fa,#ce93d8);padding:16px}
.card{width:100%;max-width:430px;background:rgba(255,255,255,.94);border-radius:32px;padding:24px;box-shadow:0 18px 45px rgba(0,0,0,.22)}
h1{font-size:24px;color:#5d4037;margin:0 0 18px;white-space:nowrap}
#timer{font-size:68px;font-weight:900;color:#1a237e;background:#fff8e1;border-radius:24px;padding:18px;margin:18px 0}
.progress-wrap{height:18px;background:#ddd;border-radius:20px;overflow:hidden}
#progressBar{height:100%;width:0;background:linear-gradient(90deg,#66bb6a,#ffee58,#ff7043)}
.buttons{display:flex;gap:12px;justify-content:center;margin:20px 0}
button{flex:1;padding:16px;font-size:24px;border:none;border-radius:18px;color:#fff;font-weight:bold}
#startBtn{background:#43a047}#stopBtn{background:#d32f2f}
#status{background:#e3f2fd;border-radius:18px;padding:14px;font-size:20px;font-weight:bold;min-height:56px;display:flex;align-items:center;justify-content:center}
.message{margin-top:16px;background:#fff3e0;padding:12px;border-radius:16px;font-size:18px}
</style>
</head>
<body>
<div class="card">
<h1>🍎 Ray's Timer 🥦</h1>
<div id="timer">20:00</div>
<div class="progress-wrap"><div id="progressBar"></div></div>
<div class="buttons">
<button id="startBtn">▶ Start</button>
<button id="stopBtn">■ Stop</button>
</div>
<div id="status">Ready</div>
<div class="message">⭐ Eat slowly and enjoy every bite! 😊</div>
</div>
<script>
let countdownId=null,totalSeconds=1200,remainingSeconds=1200,lastAnnouncedMinute=0;
const startBtn=document.getElementById("startBtn"),stopBtn=document.getElementById("stopBtn"),timer=document.getElementById("timer"),status=document.getElementById("status"),progressBar=document.getElementById("progressBar");
function formatTime(s){return `${Math.floor(s/60)}:${String(s%60).padStart(2,"0")}`}
function update(){timer.innerText=formatTime(remainingSeconds);progressBar.style.width=((1200-remainingSeconds)/1200*100)+"%";}
function speak(t){speechSynthesis.cancel();setTimeout(()=>speechSynthesis.speak(new SpeechSynthesisUtterance(t)),100);}
function confetti(){["🎉","⭐","🌈","🍎"].forEach((e,i)=>{for(let j=0;j<6;j++){let d=document.createElement("div");d.textContent=e;d.style.cssText=`position:fixed;left:${Math.random()*100}vw;top:-20px;font-size:28px;animation:f 3s linear forwards`;document.body.appendChild(d);setTimeout(()=>d.remove(),3000);}})}
const st=document.createElement("style");st.textContent="@keyframes f{to{transform:translateY(110vh) rotate(360deg);opacity:0}}";document.head.appendChild(st);
function startTimer(){stopTimer(false);remainingSeconds=1200;lastAnnouncedMinute=0;update();status.innerText="Timer started";speak("Ray, meal timer started for 20 minutes.");countdownId=setInterval(()=>{remainingSeconds--;update();const m=Math.floor((1200-remainingSeconds)/60);if(m>lastAnnouncedMinute&&m<20){lastAnnouncedMinute=m;let msg;switch(m){case 5:msg="Ray, 5 minutes completed. Great job! 15 minutes left.";break;case 10:msg="Ray, 10 minutes completed. You're halfway there! 10 minutes left.";break;case 15:msg="Ray, 15 minutes completed. Only 5 minutes left.";break;default:msg=`${m} minute${m>1?"s":""} completed. ${20-m} minutes left.`;}status.innerText=msg;speak(msg);}if(remainingSeconds<=0){clearInterval(countdownId);countdownId=null;remainingSeconds=0;update();status.innerText="🎉 Time's Up!";speak("Ray, your time is up. Mommy is coming to get you.");confetti();}},1000);}
function stopTimer(a=true){if(countdownId){clearInterval(countdownId);countdownId=null;}speechSynthesis.cancel();remainingSeconds=1200;lastAnnouncedMinute=0;update();status.innerText=a?"Timer stopped":"Ready";if(a)speak("Timer stopped.");}
startBtn.onclick=startTimer;stopBtn.onclick=()=>stopTimer(true);update();
</script>
</body></html>
