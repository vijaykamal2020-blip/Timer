<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Meal Timer</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      text-align: center;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #ffecb3, #ffcc80, #a5d6a7, #81d4fa);
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 430px;
      background: rgba(255, 255, 255, 0.92);
      border-radius: 32px;
      padding: 32px 22px;
      box-shadow: 0 18px 45px rgba(0,0,0,0.22);
      border: 5px solid rgba(255,255,255,0.75);
    }

    h1 {
      font-size: 34px;
      color: #5d4037;
      margin: 0 0 20px;
      text-shadow: 2px 2px #fff3e0;
    }

    #timer {
      font-size: 76px;
      margin: 20px 0;
      font-weight: 900;
      color: #1a237e;
      background: #fff8e1;
      border-radius: 28px;
      padding: 22px 10px;
      box-shadow: inset 0 0 18px rgba(255,193,7,0.35);
    }

    .buttons {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    button {
      font-size: 25px;
      padding: 16px 34px;
      border-radius: 20px;
      border: none;
      color: white;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 10px 18px rgba(0,0,0,0.22);
    }

    #startBtn {
      background: linear-gradient(180deg, #66bb6a, #2e7d32);
    }

    #stopBtn {
      background: linear-gradient(180deg, #ff7043, #d32f2f);
    }

    button:active {
      transform: scale(0.96);
    }

    #status {
      font-size: 24px;
      margin-top: 24px;
      color: #263238;
      background: #e3f2fd;
      border-radius: 22px;
      padding: 16px;
      font-weight: bold;
    }

    .message {
      margin-top: 20px;
      font-size: 21px;
      color: #6d4c41;
      background: #fff3e0;
      border-radius: 20px;
      padding: 14px;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>🍎 20 Minute Meal Timer 🥦</h1>

    <div id="timer">20:00</div>

    <div class="buttons">
      <button id="startBtn">▶ Start</button>
      <button id="stopBtn">■ Stop</button>
    </div>

    <div id="status">Ready</div>

    <div class="message">⭐ Eat slowly and enjoy every bite! 😊</div>
  </div>

<script>
let countdownId = null;
let totalSeconds = 20 * 60;
let remainingSeconds = totalSeconds;
let lastAnnouncedMinute = 0;

const startBtn = document.getElementById("startBtn");
const stopBtn = document.getElementById("stopBtn");
const timer = document.getElementById("timer");
const status = document.getElementById("status");

function formatTime(seconds) {
  const mins = Math.floor(seconds / 60);
  const secs = seconds % 60;
  return `${mins}:${secs.toString().padStart(2, "0")}`;
}

function updateDisplay() {
  timer.innerText = formatTime(remainingSeconds);
}

function speak(text) {
  window.speechSynthesis.cancel();
  setTimeout(() => {
    const msg = new SpeechSynthesisUtterance(text);
    msg.rate = 0.9;
    window.speechSynthesis.speak(msg);
  }, 100);
}

function startTimer() {
  stopTimer(false);

  remainingSeconds = totalSeconds;
  lastAnnouncedMinute = 0;
  updateDisplay();

  status.innerText = "Timer started";
  speak("Meal timer started for 20 minutes.");

  countdownId = setInterval(() => {
    remainingSeconds--;
    updateDisplay();

    const completedMinutes = Math.floor((totalSeconds - remainingSeconds) / 60);

    if (completedMinutes > lastAnnouncedMinute && completedMinutes < 20) {
      lastAnnouncedMinute = completedMinutes;
      const left = 20 - completedMinutes;
      const message = `${completedMinutes} minute${completedMinutes > 1 ? "s" : ""} completed. ${left} minute${left !== 1 ? "s" : ""} left.`;
      status.innerText = message;
      speak(message);
    }

    if (remainingSeconds <= 0) {
      clearInterval(countdownId);
      countdownId = null;
      remainingSeconds = 0;
      updateDisplay();
      status.innerText = "Completed";
      speak("20 minutes completed. Great job!");
    }

  }, 1000);
}

function stopTimer(announce = true) {
  if (countdownId !== null) {
    clearInterval(countdownId);
    countdownId = null;
  }

  window.speechSynthesis.cancel();

  remainingSeconds = totalSeconds;
  lastAnnouncedMinute = 0;
  updateDisplay();

  if (announce) {
    status.innerText = "Timer stopped";
    speak("Timer stopped.");
  } else {
    status.innerText = "Ready";
  }
}

startBtn.addEventListener("click", startTimer);
stopBtn.addEventListener("click", () => stopTimer(true));

updateDisplay();
</script>
</body>
</html>
