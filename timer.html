<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>20 Min Voice Timer</title>
  <style>
    body { font-family: Arial, sans-serif; text-align:center; padding:40px; }
    button { font-size:24px; padding:15px 35px; border-radius:12px; margin:8px; }
    #status { font-size:24px; margin-top:30px; }
  </style>
</head>
<body>
  <h1>20 Minute Voice Timer</h1>

  <button onclick="startTimer()">▶ Start</button>
  <button onclick="stopTimer()">■ Stop</button>

  <div id="status">Ready</div>

<script>
let interval;
let minute = 0;
const total = 20;

function speak(text){
    speechSynthesis.cancel();
    const msg = new SpeechSynthesisUtterance(text);
    msg.rate = 0.9;
    msg.pitch = 1;
    speechSynthesis.speak(msg);
}

function startTimer(){
    stopTimer();
    minute = 0;
    document.getElementById("status").innerText = "Timer Started";
    speak("Timer started for 20 minutes.");

    interval = setInterval(function(){
        minute++;
        const left = total - minute;

        let message;

        if(minute < total){
            message = `${minute} minute${minute>1?'s':''} completed. ${left} minute${left!==1?'s':''} left.`;
        }else{
            message = "20 minutes completed. Great job!";
            stopTimer();
        }

        document.getElementById("status").innerText = message;
        speak(message);

    },60000);
}

function stopTimer(){
    clearInterval(interval);
}
</script>
</body>
</html>
